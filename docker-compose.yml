# docker-compose tối thiểu cho module chatbot (GĐ1 + nlu GĐ2) — §9.2.
# Kafka & Elasticsearch KHÔNG có trong luồng chat đồng bộ nên loại khỏi đây (§9.2).
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: roomfinder
    ports: ["3306:3306"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  app:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: roomfinder
      DB_USER: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Cấp GEMINI_API_KEY từ shell: `export GEMINI_API_KEY=...` trước khi up.
      # Nếu để trống, NLU/NLG tự fallback rule-based/template (vẫn chạy được).
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # NLU PhoBERT (GĐ2, bước 2.4). nlu chết → app tự fallback LLM, nên
      # KHÔNG depends_on nlu — app không đợi/không sập theo nlu.
      NLU_URL: http://nlu:8000
    ports: ["8081:8080"]

  # NLU PhoBERT (GĐ2, SPEC §11 bước 2.3). Model KHÔNG bake vào image —
  # mount từ ml/out-* (phải train xong trước: xem ml/README.md).
  # Spring chưa gọi service này (bước 2.4); app vẫn chạy được khi nlu tắt.
  nlu:
    build:
      context: .
      dockerfile: nlu-service/Dockerfile
    volumes:
      - ./ml/out-intent:/app/ml/out-intent:ro
      - ./ml/out-ner:/app/ml/out-ner:ro
    ports: ["8000:8000"]
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
